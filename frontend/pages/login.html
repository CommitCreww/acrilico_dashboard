<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - Ludarte Acrilicos</title>
    <link rel="stylesheet" href="../css/style.css">
    <script defer src="../js/auth.js"></script>
</head>

<body>
    <div class="login-container">
        <h2>Login</h2>
        <form id="loginForm">
            <input
            type="email"
            id="email"
            placeholder="Email"
            required
            >
            <input
            type="password"
            id="senha"
            placeholder="Senha"
            required
            >
            <button type="submit">
            Entrar
            </button>
        </form>
        <p id="erro"></p>
    </div>
</body>
</html>
