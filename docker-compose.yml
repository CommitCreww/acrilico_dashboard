version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: acrilico_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - acrilico_network

  adminer:
    image: adminer
    container_name: acrilico_adminer
    restart: always
    profiles:
      - tools
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    networks:
      - acrilico_network

volumes:
  postgres_data:

networks:
  acrilico_network:
    driver: bridge
